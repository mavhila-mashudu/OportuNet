<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Role</title>

  <link rel="stylesheet" href="chooseRoles_style.css">
</head>
<body>

<main class="login_form">
  <h1>Select Your Role</h1>

  <p style="text-align:center; margin-bottom: 25px; color:#666;">
    Tell us how you want to use the platform
  </p>

  <section class="role-options">
    <button class="role-btn" id="applicantBtn" type="button">
      Applicant
      <small>Find jobs & apply</small>
    </button>

    <button class="role-btn" id="recruiterBtn" type="button">
      Recruiter
      <small>Post jobs & hire</small>
    </button>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="signup_logIn.js"></script>
<script src="chooseRoles.js"></script>

</body>
</html>
